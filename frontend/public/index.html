<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- ── Primary SEO ───────────────────────── -->
  <title>GadgetGlam — Premium Phone Accessories in Pakistan</title>

  <!-- ── Open Graph (Facebook / WhatsApp) ─── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://www.gadgetglam.pk/" />
  <meta property="og:title"       content="GadgetGlam — Premium Phone Accessories" />
  <meta property="og:description" content="Discover premium phone accessories at GadgetGlam. Cases, chargers, earphones and more — all curated for your style." />

  <script type="application/ld+json">

    "url": "https://www.gadgetglam.pk",
    "logo": "https://www.gadgetglam.pk/logo.png",
    "description": "Premium phone accessories store in Pakistan",
    "address": {
      "@type": "PostalAddress",

    },

      "https://www.facebook.com/gadgetglam",

    ]
  }
  </script>
